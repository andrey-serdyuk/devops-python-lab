<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">▮▮▯</span>
        <h1>Movie Tracker</h1>
      </div>
      <div class="topbar-actions">
        <button id="btn-dummy" class="btn btn-ghost">Load sample data</button>
        <button id="btn-export" class="btn btn-ghost">Export JSON</button>
        <label class="btn btn-ghost" for="file-import">Import JSON</label>
        <input id="file-import" type="file" accept="application/json,.json" hidden />
      </div>
    </header>

    <!-- Summary cards -->
    <section class="summary" id="summary">
      <div class="stat-card">
        <span class="stat-label">Total movies</span>
        <span class="stat-value" id="stat-total">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Average rating</span>
        <span class="stat-value" id="stat-average">—</span>
      </div>
      <div class="stat-card stat-card--accent">
        <span class="stat-label">Top movie</span>
        <span class="stat-value" id="stat-top">—</span>
      </div>
    </section>

    <!-- Add / edit form -->
    <section class="panel">
      <h2 class="panel-title" id="form-title">Add a movie</h2>
      <form id="movie-form" class="movie-form" autocomplete="off">
        <input type="hidden" id="edit-index" value="-1" />
        <div class="field">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Inception" required />
        </div>
        <div class="field">
          <label for="genre">Genre</label>
          <input type="text" id="genre" placeholder="Sci-Fi" required />
        </div>
        <div class="field field--narrow">
          <label for="rating">Rating (0–10)</label>
          <input type="number" id="rating" min="0" max="10" step="0.1" placeholder="9.0" required />
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="form-submit">Add movie</button>
          <button type="button" class="btn btn-ghost" id="form-cancel" hidden>Cancel</button>
        </div>
      </form>
    </section>

    <!-- Toolbar: search / filter / sort -->
    <section class="toolbar">
      <div class="toolbar-group toolbar-group--grow">
        <input type="search" id="search" placeholder="Search by title…" />
      </div>
      <div class="toolbar-group">
        <select id="filter-genre">
          <option value="">All genres</option>
        </select>
        <select id="sort">
          <option value="default">Sort: default</option>
          <option value="rating-desc">Rating: high → low</option>
          <option value="rating-asc">Rating: low → high</option>
          <option value="title-asc">Title: A → Z</option>
        </select>
      </div>
    </section>

    <!-- Movie table -->
    <section class="panel panel--table">
      <table class="movie-table">
        <thead>
          <tr>
            <th class="col-id">#</th>
            <th>Title</th>
            <th>Genre</th>
            <th class="col-rating">Rating</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="movie-rows"></tbody>
      </table>
      <p class="empty" id="empty-state" hidden>No movies to show. Add one above or load the sample data.</p>
    </section>

    <footer class="footer">
      Data is stored locally in your browser.
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js"></script>
</body>
</html>
